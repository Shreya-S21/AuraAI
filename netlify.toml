# ===== Netlify deployment config for AuraAI frontend =====
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every route serves index.html so client-side
# navigation (and deep links) work after refresh.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
